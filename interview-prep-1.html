<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micron MPE Interview Prep — Vaibhav Mistari</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C0F1A;--surface:#151929;--surface2:#1C2236;--surface3:#232840;--border:#2A3050;--border-glow:#3D4A7A;--text:#E8ECF4;--text-dim:#8892B0;--text-muted:#5A6380;--accent:#64FFDA;--accent-dim:rgba(100,255,218,0.12);--accent-glow:rgba(100,255,218,0.25);--blue:#5B9CF6;--blue-dim:rgba(91,156,246,0.12);--purple:#B388FF;--purple-dim:rgba(179,136,255,0.12);--amber:#FFD54F;--amber-dim:rgba(255,213,79,0.12);--rose:#FF8A80;--rose-dim:rgba(255,138,128,0.12);--success:#69F0AE;--success-dim:rgba(105,240,174,0.12);--radius:12px;--radius-sm:8px;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;--display:'Fraunces',Georgia,serif;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;}::selection{background:var(--accent);color:var(--bg);}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.4;}
.hero{padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;}.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,var(--accent-glow) 0%,transparent 70%);opacity:0.15;pointer-events:none;}.hero-label{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;opacity:0.8;}.hero h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:var(--text);margin-bottom:0.25rem;font-style:italic;}.hero .sub{color:var(--text-dim);font-size:0.88rem;margin-bottom:1.5rem;}
.progress-hub{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}.ring-wrap{position:relative;width:88px;height:88px;}.ring-wrap svg{transform:rotate(-90deg);}.ring-bg{fill:none;stroke:var(--surface3);stroke-width:5;}.ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);}.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}.ring-pct{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--accent);}.ring-sub{font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;}.stats{display:flex;flex-direction:column;gap:0.35rem;}.stat-row{display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--text-dim);}.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.schedule{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.5rem;}.sched-chip{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:0.72rem;color:var(--text-dim);}.sched-chip .dot{width:6px;height:6px;border-radius:50%;}
.steps-nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0.5rem 1rem;overflow-x:auto;display:flex;gap:0.25rem;-webkit-overflow-scrolling:touch;}.steps-nav::-webkit-scrollbar{height:0;}.step-pill{flex-shrink:0;display:flex;align-items:center;gap:0.4rem;padding:0.45rem 0.85rem;border:1px solid transparent;border-radius:20px;background:transparent;color:var(--text-muted);font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.25s;font-family:var(--sans);white-space:nowrap;}.step-pill:hover{color:var(--text-dim);border-color:var(--border);}.step-pill.active{color:var(--accent);background:var(--accent-dim);border-color:rgba(100,255,218,0.2);}.step-pill.done{color:var(--success);border-color:rgba(105,240,174,0.15);}.step-pill .pill-check{display:none;width:14px;height:14px;}.step-pill.done .pill-check{display:inline-block;}.step-pill .pill-num{font-family:var(--mono);font-size:0.65rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface3);color:var(--text-muted);}.step-pill.active .pill-num{background:var(--accent);color:var(--bg);}.step-pill.done .pill-num{display:none;}
.main{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
.step{display:none;animation:fadeUp 0.35s ease;}.step.active{display:block;}@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.step-header{margin-bottom:1.5rem;}.step-num{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:0.25rem;}.step-title{font-family:var(--display);font-size:1.5rem;font-weight:700;color:var(--text);font-style:italic;}.step-desc{color:var(--text-dim);font-size:0.85rem;margin-top:0.35rem;max-width:600px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;transition:border-color 0.2s;}.card:hover{border-color:var(--border-glow);}.card h3{font-size:0.95rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;}.card h4{font-size:0.85rem;font-weight:600;color:var(--blue);margin:0.85rem 0 0.4rem;}.card p{font-size:0.85rem;color:var(--text-dim);margin-bottom:0.4rem;}.card ul,.card ol{margin-left:1.25rem;margin-bottom:0.65rem;}.card li{font-size:0.85rem;color:var(--text-dim);margin-bottom:0.3rem;}.card li strong{color:var(--text);}
.badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.15rem 0.55rem;border-radius:20px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);}.badge-erik{background:var(--blue-dim);color:var(--blue);}.badge-jeff{background:var(--purple-dim);color:var(--purple);}
.tip{background:var(--accent-dim);border-left:3px solid var(--accent);padding:0.7rem 0.9rem;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:0.75rem 0;font-size:0.82rem;color:var(--text-dim);}.tip strong{color:var(--accent);}.tip-amber{background:var(--amber-dim);border-left-color:var(--amber);}.tip-amber strong{color:var(--amber);}
.table-wrap{overflow-x:auto;margin:0.75rem 0;border-radius:var(--radius-sm);border:1px solid var(--border);}table{width:100%;border-collapse:collapse;font-size:0.82rem;}th{background:var(--surface3);color:var(--text);padding:0.65rem 0.75rem;text-align:left;font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;}td{padding:0.65rem 0.75rem;border-top:1px solid var(--border);color:var(--text-dim);vertical-align:top;}tr:hover td{background:rgba(100,255,218,0.03);}
.chk{display:flex;align-items:flex-start;gap:0.65rem;padding:0.55rem 0;border-bottom:1px solid var(--border);}.chk:last-child{border-bottom:none;}.chk input[type="checkbox"]{margin-top:0.15rem;width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}.chk label{font-size:0.85rem;color:var(--text-dim);cursor:pointer;transition:all 0.2s;}.chk.done label{text-decoration:line-through;color:var(--text-muted);}
.flashcard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;user-select:none;}.flashcard:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-dim);}.flashcard .fc-label{font-family:var(--mono);font-size:0.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:0.5rem;}.flashcard .fc-q{font-size:1rem;font-weight:600;color:var(--text);}.flashcard .fc-a{display:none;font-size:0.88rem;color:var(--text-dim);line-height:1.65;text-align:left;}.flashcard.flipped .fc-q{display:none;}.flashcard.flipped .fc-a{display:block;}.flashcard.flipped .fc-label{color:var(--blue);}.fc-controls{display:flex;gap:0.5rem;justify-content:center;margin-top:0.75rem;}.fc-btn{padding:0.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:var(--sans);}.fc-btn:hover{border-color:var(--accent);color:var(--accent);}.fc-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}.fc-btn.primary:hover{opacity:0.85;}
.email{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.15rem;font-size:0.85rem;line-height:1.7;color:var(--text-dim);}.email .subj{font-weight:600;color:var(--text);margin-bottom:0.6rem;font-family:var(--mono);font-size:0.8rem;}.email .placeholder{background:var(--amber-dim);color:var(--amber);padding:0.1rem 0.35rem;border-radius:3px;font-family:var(--mono);font-size:0.78rem;}
.vgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0.75rem;margin:0.75rem 0;}.vcard{padding:0.85rem;background:var(--surface);border-radius:0 var(--radius-sm) var(--radius-sm) 0;border:1px solid var(--border);border-left:3px solid var(--accent);}.vcard h4{font-size:0.88rem;color:var(--accent);margin-bottom:0.3rem;}.vcard p{font-size:0.82rem;color:var(--text-dim);margin-bottom:0.2rem;}.vcard .ex{font-size:0.78rem;color:var(--text-muted);font-style:italic;}
.ctabs{display:flex;gap:0;margin-bottom:0;}.ctab{padding:0.45rem 0.85rem;background:var(--surface3);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:0.75rem;font-weight:500;color:var(--text-muted);transition:all 0.2s;font-family:var(--sans);}.ctab:first-child{border-radius:var(--radius-sm) 0 0 0;}.ctab:last-child{border-radius:0 var(--radius-sm) 0 0;}.ctab.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(100,255,218,0.2);}.ccontent{display:none;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);font-size:0.88rem;color:var(--text-dim);line-height:1.7;}.ccontent.on{display:block;}
.step-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border);}.mark-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.2rem;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s;font-family:var(--sans);}.mark-btn:hover{background:var(--accent);color:var(--bg);}.mark-btn.completed{background:var(--success-dim);border-color:var(--success);color:var(--success);pointer-events:none;}.nav-btn{padding:0.45rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:var(--sans);}.nav-btn:hover{border-color:var(--text-dim);color:var(--text);}.nav-btn:disabled{opacity:0.3;cursor:default;}
.share-tag{display:inline-block;font-family:var(--mono);font-size:0.65rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:3px;margin-right:0.3rem;background:var(--accent-dim);color:var(--accent);}
@media(max-width:640px){.hero{padding:1.5rem 1rem 1.25rem;}.hero h1{font-size:1.4rem;}.progress-hub{gap:1rem;}.main{padding:1rem 0.85rem 3rem;}.card{padding:1rem;}.vgrid{grid-template-columns:1fr;}.step-footer{flex-wrap:wrap;gap:0.75rem;}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-label">Micron Technology · Materials Planning Engineer · JR90145</div>
  <h1>Interview Prep Tracker</h1>
  <div class="sub">Step-by-step preparation with progress tracking</div>
  <div class="progress-hub">
    <div class="ring-wrap"><svg width="88" height="88" viewBox="0 0 88 88"><circle class="ring-bg" cx="44" cy="44" r="38"/><circle class="ring-fg" id="progressRing" cx="44" cy="44" r="38" stroke-dasharray="238.76" stroke-dashoffset="238.76"/></svg><div class="ring-label"><span class="ring-pct" id="pctLabel">0%</span><span class="ring-sub">Ready</span></div></div>
    <div class="stats"><div class="stat-row"><span class="stat-dot" style="background:var(--accent)"></span><span id="statDone">0</span> / <span id="statTotal">12</span> steps complete</div><div class="stat-row"><span class="stat-dot" style="background:var(--blue)"></span><span id="statCards">0</span> flashcards practiced</div><div class="stat-row"><span class="stat-dot" style="background:var(--amber)"></span><span id="statChecks">0</span> checklist items done</div></div>
  </div>
  <div class="schedule"><span class="sched-chip"><span class="dot" style="background:var(--blue)"></span>03/30 3-4 PM · Erik ReVeal</span><span class="sched-chip"><span class="dot" style="background:var(--purple)"></span>TBD · Erik ReVeal & Jeff Binford</span></div>
  <button onclick="if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem('micronPrep');location.reload();}" style="margin-top:0.75rem;padding:0.3rem 0.85rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.65rem;font-family:var(--sans);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;" onmouseover="this.style.borderColor='var(--rose)';this.style.color='var(--rose)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">↺ Reset Progress</button>
</div>
<div class="steps-nav" id="stepsNav"></div>
<div class="main" id="mainContent"></div>
<script>
const STEPS=[{id:'interviewers',title:'Know Your Interviewers',icon:'👤',desc:'Understand who you\u2019re talking to and what they care about.'},{id:'share',title:'SHARE Method',icon:'📖',desc:'Your answer framework — Situation, Hindrance, Action, Result, Evaluate.'},{id:'flashcards',title:'Flashcard Drill',icon:'🃏',desc:'Quick-fire practice on Micron facts, your stories, and interviewer strategy.'},{id:'common',title:'Top 5 Questions',icon:'💬',desc:'SHARE-method answers for the 5 most likely questions.'},{id:'culture',title:'Values & Culture Fit',icon:'🤝',desc:'Map your experience to Micron\u2019s 5 core values.'},{id:'criteria',title:'Evaluation Criteria',icon:'📋',desc:'Align to every category Micron evaluates candidates on.'},{id:'behavioral',title:'Behavioral Prep',icon:'🧠',desc:'10 behavioral questions with SHARE frameworks.'},{id:'technical',title:'Technical Scenarios',icon:'⚙️',desc:'3 materials planning scenarios with ideal answers.'},{id:'weakness',title:'Weakness Strategy',icon:'⚖️',desc:'3 strategic weakness answers ready to deploy.'},{id:'questions',title:'Questions to Ask',icon:'🎯',desc:'10 strategic questions tailored to each interviewer.'},{id:'closing',title:'Closing & Follow-Up',icon:'✉️',desc:'3 closing statements + thank-you email templates.'},{id:'gameday',title:'Game Day Checklist',icon:'📋',desc:'Final checklist to run through before the interview.'}];
const FLASHCARDS=[{q:'What does a Materials Planning Engineer at Micron do?',a:'Manages BOM-based material forecasting, supplier coordination, inventory optimization, cost-per-wafer analysis, and production readiness. Key contact between engineering, supply chain, finance, procurement, and production.'},{q:'What is Micron\u2019s US Expansion about?',a:'CHIPS Act-funded construction of a new high-volume memory manufacturing fab in Boise, Idaho. Building DRAM/NAND capacity to strengthen domestic semiconductor supply.'},{q:'Micron\u2019s 5 Core Values?',a:'Collaboration, Tenacity, Customer Focused, Innovation, People. Weave these into every answer.'},{q:'What is DRAM vs NAND?',a:'DRAM = Dynamic RAM (volatile, fast, active computing). NAND = Non-volatile flash storage (SSDs, phones). Micron is a global leader in both.'},{q:'What is a BOM in semiconductor context?',a:'Bill of Materials — list of raw materials, chemicals, gases, components per wafer/process step. Materials planning engineers manage BOMs to forecast demand and cost.'},{q:'What is S&OP?',a:'Sales & Operations Planning — cross-functional process aligning production with demand forecasts. Materials planners feed supply readiness data.'},{q:'Erik ReVeal — what to emphasize?',a:'Analytical skills (SQL/JMP), data-driven decisions, cost optimization ($400K), cross-functional collaboration, BOM work. He manages ~$600M capital budget.'},{q:'Jeff Binford — what to emphasize?',a:'Strategic vision, long-term Boise commitment, semiconductor passion, scaling processes. 20+ years across Micron global sites.'},{q:'Your $400K cost savings — key points?',a:'Lean audit → redundant fittings → standardized parts (SS/Al) → consolidated vendors → volume pricing → $400K savings + simplified BOMs + shorter lead times.'},{q:'Your 8D investigation — key points?',a:'H₂ purity drop → 8D task force → SQL/JMP analysis → faulty drain filter → moisture degrading adsorbent → filter replacement → restored purity → SPC monitoring.'},{q:'Your DOE optimization — key points?',a:'H₂ purification → factorial DOE → characterized working capacity, breakthrough time, MTZ → +20% process margin → reduced variability.'},{q:'What is MRP/ERP?',a:'MRP = Material Requirements Planning. ERP = Enterprise Resource Planning (broader: MRP + finance + HR + procurement). Micron uses SAP.'},{q:'SHARE vs STAR difference?',a:'SHARE adds H (Hindrance) for obstacles and E (Evaluate) for self-reflection. The E shows growth mindset — what Micron\u2019s criteria reward.'},{q:'Why Boise?',a:'Micron HQ. US expansion = once-in-a-generation opportunity. Ready to relocate long-term. Quality of life + semiconductor ecosystem growth.'}];
let state;try{state=JSON.parse(localStorage.getItem('micronPrep')||'{}');}catch(e){state={};}
function saveState(){localStorage.setItem('micronPrep',JSON.stringify(state));}
function getStepDone(id){return state.steps?.[id]||false;}function setStepDone(id,v){if(!state.steps)state.steps={};state.steps[id]=v;saveState();}
function getCheckDone(key){return state.checks?.[key]||false;}function setCheckDone(key,v){if(!state.checks)state.checks={};state.checks[key]=v;saveState();}
function getFlashcardsDone(){return state.fcDone||0;}function setFlashcardsDone(n){state.fcDone=n;saveState();}
let currentStep=state.currentStep||0,fcIndex=0;
function renderNav(){document.getElementById('stepsNav').innerHTML=STEPS.map((s,i)=>{const done=getStepDone(s.id),active=i===currentStep;return`<button class="step-pill${active?' active':''}${done?' done':''}" onclick="goStep(${i})"><svg class="pill-check" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="var(--success)" opacity="0.2"/><path d="M4 7l2 2 4-4" stroke="var(--success)" stroke-width="1.5" stroke-linecap="round"/></svg><span class="pill-num">${i+1}</span>${s.icon} ${s.title}</button>`;}).join('');}
function renderProgress(){const done=STEPS.filter(s=>getStepDone(s.id)).length,total=STEPS.length,pct=Math.round(done/total*100),circ=238.76;document.getElementById('progressRing').style.strokeDashoffset=circ-circ*pct/100;document.getElementById('pctLabel').textContent=pct+'%';document.getElementById('statDone').textContent=done;document.getElementById('statTotal').textContent=total;document.getElementById('statCards').textContent=getFlashcardsDone();const checks=state.checks?Object.values(state.checks).filter(Boolean).length:0;document.getElementById('statChecks').textContent=checks;}
function goStep(i){currentStep=i;state.currentStep=i;saveState();renderNav();renderStep();window.scrollTo({top:document.querySelector('.steps-nav').offsetTop-10,behavior:'smooth'});}
function renderStep(){const s=STEPS[currentStep];document.getElementById('mainContent').innerHTML=`<div class="step active"><div class="step-header"><div class="step-num">Step ${currentStep+1} of ${STEPS.length}</div><div class="step-title">${s.icon} ${s.title}</div><div class="step-desc">${s.desc}</div></div><div id="stepBody"></div><div class="step-footer"><button class="nav-btn" onclick="goStep(${currentStep-1})" ${currentStep===0?'disabled':''}>← Previous</button><button class="mark-btn${getStepDone(s.id)?' completed':''}" id="markBtn" onclick="markDone()">${getStepDone(s.id)?'<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Completed':'☐ Mark Complete'}</button><button class="nav-btn" onclick="goStep(${currentStep+1})" ${currentStep===STEPS.length-1?'disabled':''}>Next →</button></div></div>`;window['render_'+s.id](document.getElementById('stepBody'));}
function markDone(){const s=STEPS[currentStep],nv=!getStepDone(s.id);setStepDone(s.id,nv);renderNav();renderProgress();const btn=document.getElementById('markBtn');if(nv){btn.classList.add('completed');btn.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Completed';if(currentStep<STEPS.length-1)setTimeout(()=>goStep(currentStep+1),600);}else{btn.classList.remove('completed');btn.innerHTML='☐ Mark Complete';}}
function toggleChk(cb,key){setCheckDone(key,cb.checked);cb.closest('.chk').classList.toggle('done',cb.checked);renderProgress();}

function render_interviewers(el){el.innerHTML=`<div class="card"><div style="margin-bottom:0.75rem;"><h3><span class="badge badge-erik">03/30 3-4 PM</span> Erik ReVeal — Sr Manager, Capital & Materials Planning</h3></div><p><strong style="color:var(--text)">Background:</strong> Previously Advanced Materials R&D Ops Manager at Oceanit. Manages 5 Manufacturing Integration Engineers + 2 Capital Coordinators. Owns Capital Planning for TD’s ~$600M annual budget.</p><h4>Key Responsibilities</h4><ul><li>Monthly Capital review for forecast and budget targets</li><li>Tableau/Excel reporting: working-level to executive summaries</li><li>Partners with Finance & Procurement for negotiation opportunities</li><li>Led SAP capital management deployment and wafer cost analysis</li></ul><h4>What He’ll Assess</h4><ul><li><strong>Analytical skills</strong> — SQL, JMP, data-driven decisions</li><li><strong>Cross-functional collaboration</strong> — Engineering, supply chain, finance</li><li><strong>Cost optimization</strong> — Your $400K story is directly relevant</li><li><strong>Planning process comfort</strong> — BOMs, forecasting, capital planning</li></ul><div class="tip"><strong>Strategy:</strong> Lead with SQL/JMP data analysis, DOE optimization (+20%), Lean cost savings ($400K), BOM standardization, and cross-functional collaboration at OneH2.</div></div><div class="card"><div style="margin-bottom:0.75rem;"><h3><span class="badge badge-jeff">FOLLOW-UP</span> Jeff Binford — Senior Director, US Expansion Planning</h3></div><p><strong style="color:var(--text)">Background:</strong> 20+ years in planning, operations, and industrial engineering in semiconductor manufacturing. Started as IE in Micron’s Boise factory. Worked in Japan, Virginia, Utah, Singapore. Returned for CHIPS Act expansion.</p><h4>What He’ll Assess</h4><ul><li><strong>Strategic vision</strong> — Expansion-scale planning understanding</li><li><strong>Long-term commitment</strong> — Stability, Boise relocation</li><li><strong>Semiconductor understanding</strong> — Have you done homework?</li><li><strong>Leadership potential</strong> — Can you grow with the team?</li></ul><div class="tip"><strong>Strategy:</strong> Show semiconductor passion, commit to Boise, demonstrate career vision. Lead with process scaling (PSA SOPs, AM scale-up). Ask what makes Boise expansion unique vs his global experiences.</div></div>`;}

function render_share(el){el.innerHTML=`<div class="card"><h3>📖 The SHARE Framework</h3><p>All behavioral answers use SHARE — an enhanced STAR alternative with reflective evaluation.</p><div class="table-wrap"><table><thead><tr><th style="width:12%">Letter</th><th style="width:22%">Meaning</th><th>What to Do</th></tr></thead><tbody><tr><td><span class="share-tag">S</span></td><td><strong>Situation</strong></td><td>Set the scene. Describe context, project, or challenge.</td></tr><tr><td><span class="share-tag">H</span></td><td><strong>Hindrance</strong></td><td>Outline obstacles, constraints, or blockers.</td></tr><tr><td><span class="share-tag">A</span></td><td><strong>Action</strong></td><td>Specific steps YOU took to overcome the hindrance.</td></tr><tr><td><span class="share-tag">R</span></td><td><strong>Result</strong></td><td>Quantify: numbers, percentages, dollar figures.</td></tr><tr><td><span class="share-tag">E</span></td><td><strong>Evaluate</strong></td><td>Reflect: what you learned and how you’d apply it at Micron.</td></tr></tbody></table></div><div class="tip"><strong>The "E" is your differentiator.</strong> Shows self-awareness and forward thinking — exactly what Micron’s evaluation criteria reward under "Growth Mindset" and "Driven to Learn."</div></div>`;}

function render_flashcards(el){el.innerHTML=`<div class="tip-amber tip" style="margin-bottom:1rem;"><strong>Practice mode:</strong> Click cards to flip. Try to recall before revealing.</div><div id="fcArea"></div><div class="fc-controls" id="fcControls"></div>`;renderFlashcard();}
function renderFlashcard(){const fc=FLASHCARDS[fcIndex];document.getElementById('fcArea').innerHTML=`<div class="flashcard" id="fc" onclick="flipCard()"><div class="fc-label">Question · ${fcIndex+1}/${FLASHCARDS.length}</div><div class="fc-q">${fc.q}</div><div class="fc-a">${fc.a}</div></div>`;document.getElementById('fcControls').innerHTML=`<button class="fc-btn" onclick="prevCard()" ${fcIndex===0?'disabled':''}>← Prev</button><button class="fc-btn primary" onclick="nextCard()" ${fcIndex===FLASHCARDS.length-1?'disabled':''}>Next →</button>`;}
function flipCard(){const f=document.getElementById('fc');f.classList.toggle('flipped');f.querySelector('.fc-label').textContent=(f.classList.contains('flipped')?'Answer':'Question')+' · '+(fcIndex+1)+'/'+FLASHCARDS.length;}
function nextCard(){if(fcIndex<FLASHCARDS.length-1){fcIndex++;setFlashcardsDone(Math.max(getFlashcardsDone(),fcIndex+1));renderProgress();renderFlashcard();}}
function prevCard(){if(fcIndex>0){fcIndex--;renderFlashcard();}}

function render_common(el){const qs=[{q:'Tell me about yourself and why this role.',s:'Mechanical Engineer with M.S. from ASU, currently Product & Process Engineer at OneH2 on hydrogen systems.',h:'Transitioning from hydrogen to semiconductor requires demonstrating transferable analytical and supply chain skills.',a:'Led DOE (+20% margin), Lean ($400K savings) through part standardization & vendor sourcing, SQL/JMP monitoring, BOM management, cross-functional coordination.',r:'These map directly to materials forecasting, cost analysis, and supplier collaboration at Micron.',e:'Micron’s US expansion is a once-in-a-generation opportunity. My analytical engineering background positions me to add value from day one.',key:'Bridge hydrogen → semiconductor via shared analytical + cost + cross-functional skills.'},{q:'Describe solving a complex problem with data.',s:'H₂ purity dropped below spec at OneH2, threatening quality.',h:'Unknown root cause — multiple variables, no baselines.',a:'Led 8D task force. SQL/JMP analysis isolated faulty drain filter causing moisture. Implemented filter replacement + SPC limits.',r:'Restored purity, prevented recurring failures, reduced diagnostic time ~50%.',e:'8D + statistical tools — directly applicable to material quality monitoring at Micron.',key:'8D/data analysis with SQL/JMP for materials quality monitoring.'},{q:'How you reduced costs or improved efficiency.',s:'Inconsistent fittings/components across product lines — inflated costs, complex BOMs.',h:'No standardized framework. Engineers chose independently.',a:'Lean audit, identified redundancies, standardized SS & aluminum, negotiated volume pricing.',r:'$400K savings, simplified BOMs, reduced supplier complexity, shorter lead times.',e:'Maps to Micron’s needs: standardizing materials, optimizing sourcing, reducing excess.',key:'$400K Lean savings through BOM standardization.'},{q:'Cross-functional collaboration example.',s:'Releasing new hydronic thermal system from design through manufacturing.',h:'Alignment needed across mechanical, electrical, mfg, supply chain, quality.',a:'Owned end-to-end, facilitated mfg reviews, coordinated sourcing, FMEA with quality.',r:'15% thermal stability improvement, on schedule, zero rework.',e:'Cross-functional coordination is the heart of materials planning at Micron.',key:'End-to-end cross-functional delivery.'},{q:'Why Micron, why this role?',s:'Following CHIPS Act expansion — transformational moment for US semiconductor mfg.',h:'Breaking in from hydrogen requires demonstrating relevant capabilities.',a:'Researched Micron values. DOE, BOM, vendor management, SQL/JMP, Lean directly address the role.',r:'Building a new high-volume fab from ground up is rare and exciting.',e:'Long-term: grow into senior planning at Micron. Boise is where I build my career.',key:'Genuine passion + long-term Boise commitment + skill alignment.'}];el.innerHTML=qs.map((q,i)=>`<div class="card"><h3>Q${i+1}: ${q.q}</h3><p><span class="share-tag">S</span> ${q.s}</p><p><span class="share-tag">H</span> ${q.h}</p><p><span class="share-tag">A</span> ${q.a}</p><p><span class="share-tag">R</span> ${q.r}</p><p><span class="share-tag">E</span> ${q.e}</p><div class="tip"><strong>🎯 Key Point:</strong> ${q.key}</div></div>`).join('');}

function render_culture(el){const vals=[{v:'Collaboration',ex:'Led cross-functional design reviews with mfg, supply chain, quality, electrical at OneH2. DOE across Teamcenter PLM.',ask:'How do teams collaborate during expansion ramp-up?'},{v:'Tenacity',ex:'8D investigation — persisted through multiple hypotheses. 100+ SPC production runs.',ask:'Biggest challenge the expansion team has pushed through?'},{v:'Customer Focused',ex:'Designed to NFPA/OSHA standards. Optimized assistive devices reducing effort 30%.',ask:'How does planning balance mfg needs vs delivery commitments?'},{v:'Innovation',ex:'Novel multi-metal 3D printing process. First cure-time prediction framework in lab.',ask:'What innovations in planning tools is the team exploring?'},{v:'People',ex:'Trained production on SOPs. Mentored junior engineers on DFMA.',ask:'How does Micron invest in materials planning development?'}];el.innerHTML=`<div class="vgrid">${vals.map(v=>`<div class="vcard"><h4>${v.v}</h4><p>${v.ex}</p><p class="ex">Ask: "${v.ask}"</p></div>`).join('')}</div>`;}

function render_criteria(el){const secs=[{t:'Micron Attributes',r:[['Adaptable','4 domain transitions in 4 years: Rapid Prototyping → Research → Cleanroom → Hydrogen Production'],['Driven to Learn','Self-taught SQL & JMP. 3 publications including 2026 ScienceDirect.'],['Ownership','End-to-end design at OneH2. Led 8D task force with full accountability.'],['Problem Solver','DOE (+20%), prediction model (-26% defects), 8D (H₂ purity).']]},{t:'Interest & Motivation',r:[['Culture Contributor','Led initiatives, mentored junior engineers.'],['Stability','MEKA (1yr) → ASU M.S. (2yr) → OneH2 (~2yr). Relocating to Boise.'],['Interview Prep','Researched values, expansion, interviewers. SHARE answers mapped to criteria.'],['Role Prep','Studied BOM, forecasting, cost-per-wafer, supplier mgmt, inventory.']]},{t:'Leadership & Vision',r:[['Teams Led','8D task force, alloy research, assistive device prototyping.'],['Growth Mindset','4 domains. Self-taught SQL, JMP, semiconductor fundamentals.'],['Vision for Role','Go-to analytical resource: forecasting, sourcing, data-driven reporting.'],['Career Growth','MPE → Senior Planning → Strategic Expansion Planning globally.']]},{t:'Business Acumen',r:[['Drive for Results','$400K savings, 20% margin, 26% defect reduction — all on time.'],['Continuous Improvement','Lean standardization. SPC control limits.'],['Timely Decisions','Rapid 8D diagnosis preventing extended downtime.'],['Strategic Context','CHIPS Act importance for US semiconductor independence.']]}];el.innerHTML=secs.map(s=>`<div class="card"><h3>${s.t}</h3><div class="table-wrap"><table><thead><tr><th style="width:28%">Criteria</th><th>Your Evidence</th></tr></thead><tbody>${s.r.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td></tr>`).join('')}</tbody></table></div></div>`).join('');}

function render_behavioral(el){const bqs=[{q:'Adapting to significant change.',a:'<b>S:</b> India→US, academic→industrial hydrogen. <b>H:</b> New tools, standards, teams. <b>A:</b> Learning plans, mentorship, applied core skills. Leading DOE in 3 months. <b>R:</b> 20% margin improvement. <b>E:</b> Same intensity for semiconductor.'},{q:'Decision with incomplete information.',a:'<b>S:</b> 8D — multiple root causes. <b>H:</b> Can’t shut down; sensor gaps. <b>A:</b> Prioritized hypotheses, targeted tests, JMP. <b>R:</b> Found filter in 2 weeks. <b>E:</b> Comfortable with uncertainty.'},{q:'Improving a process.',a:'<b>S:</b> No standardized fitting selection. <b>H:</b> Hundreds unique parts. <b>A:</b> Lean audit, matrix, consolidated suppliers. <b>R:</b> $400K savings. <b>E:</b> Core to materials planning.'},{q:'Handling tight deadline.',a:'<b>S:</b> Reactor component deadline at CNCE. <b>H:</b> Seal failures, 2+ week risk. <b>A:</b> Root-cause, redesign, expedited fab. <b>R:</b> On-time, -10% downtime. <b>E:</b> Practiced at urgent response.'},{q:'Learning something new quickly.',a:'<b>S:</b> Needed SQL/JMP, no prior experience. <b>H:</b> No training, needed productivity now. <b>A:</b> Evening courses, practiced on data. 4 weeks productive. <b>R:</b> Found optimal setpoints. <b>E:</b> Same intensity for Micron systems.'},{q:'Influencing without authority.',a:'<b>S:</b> Needed mfg design changes. <b>H:</b> Resistant mid-run. <b>A:</b> Data-backed presentation, invited input. <b>R:</b> Voluntary adoption, -1,400+ min/month. <b>E:</b> Data-driven influence.'},{q:'Owning a mistake.',a:'<b>S:</b> Set cure params without validation. <b>H:</b> High defects, wasted week. <b>A:</b> Acknowledged, built model, SPC. <b>R:</b> -26% defects. <b>E:</b> Own fast, fix systematically.'},{q:'Prioritizing competing demands.',a:'<b>S:</b> Design + 8D + Lean simultaneously. <b>H:</b> Different stakeholders/urgency. <b>A:</b> Priority matrix, transparent comms. <b>R:</b> All three on time. <b>E:</b> Comfortable reprioritizing.'},{q:'Difficult stakeholder.',a:'<b>S:</b> Supplier missed deliveries. <b>H:</b> Strained relationship. <b>A:</b> Collaborative call, shared forecast, buffer stock. <b>R:</b> Improved delivery. <b>E:</b> Collaborative not adversarial.'},{q:'Championing continuous improvement.',a:'<b>S:</b> No monitoring after 8D. <b>H:</b> Firefighting culture. <b>A:</b> SQL/JMP pipeline, SPC, dashboards. <b>R:</b> -50% diagnostic time. <b>E:</b> Preventive mindset.'}];el.innerHTML=bqs.map((q,i)=>`<div class="card" style="cursor:pointer;" onclick="this.querySelector('.bqa').style.display=this.querySelector('.bqa').style.display==='block'?'none':'block'"><h3>BQ${i+1}: ${q.q} <span style="font-size:0.7rem;color:var(--text-muted);font-weight:400;margin-left:auto;">click to expand</span></h3><div class="bqa" style="display:none;margin-top:0.5rem;padding:0.75rem;background:var(--surface2);border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text-dim);line-height:1.7;">${q.a}</div></div>`).join('');}

function render_technical(el){const sc=[{t:'Material Demand Forecasting',q:'How would you build a forecast for a new fab?',ideal:'Tech roadmap + wafer starts → BOM requirements → phase by quarter via equipment schedule → historical baselines → safety stock models → rolling monthly forecast.',yours:'Built planning models from scratch at OneH2. BOM analysis, production schedules, SQL consumption tracking.'},{t:'Supplier Risk Mitigation',q:'Critical supplier may miss delivery by 3 weeks. What do you do?',ideal:'Assess inventory runway → communicate production impact → identify alternates → negotiate partial shipments → escalate with mitigation plan → document, consider dual-sourcing.',yours:'Managed supplier issues at OneH2. Buffer stock agreements, milestone tracking, maintained continuity.'},{t:'Cost Reduction Analysis',q:'How to identify cost savings in fab materials procurement?',ideal:'Baseline cost per wafer → Pareto top-spend → volume consolidation, negotiations, alt materials, inventory optimization → business cases → phased implementation → quarterly tracking.',yours:'Applied exactly this at OneH2: audit, consolidate, volume pricing. $400K savings. SQL/JMP cost analysis.'}];el.innerHTML=sc.map(s=>`<div class="card"><h3>⚙️ ${s.t}</h3><h4>Question</h4><p>${s.q}</p><h4>Ideal Answer</h4><p>${s.ideal}</p><div class="tip"><strong>Your Experience:</strong> ${s.yours}</div></div>`).join('')+`<div class="tip-amber tip"><strong>📚 Brush Up:</strong> DRAM/NAND basics, MRP/SAP, S&OP, semiconductor supply chain (long lead times, sole-source risks).</div>`;}

function render_weakness(el){const v=[{l:'Skill-Based ✨ (Recommended)',t:'Still building deep semiconductor supply chain expertise. Strong analytical/planning fundamentals from hydrogen, but recognize unique characteristics. Actively studying. This role is an accelerant.'},{l:'Personality-Based',t:'Can be overly thorough — spending more time validating than necessary. Working on decision criteria upfront: defining "good enough" data for each decision type.'},{l:'Work Style-Based',t:'Take on too many improvement projects simultaneously. Getting better at priority matrix to sequence by business impact.'}];el.innerHTML=`<div class="card"><h3>⚖️ Greatest Weakness</h3><p style="margin-bottom:0.75rem;">Pick ONE. Practice until smooth.</p><div class="ctabs">${v.map((x,i)=>`<button class="ctab${i===0?' on':''}" onclick="showWk(${i},this)">${x.l}</button>`).join('')}</div>${v.map((x,i)=>`<div class="ccontent${i===0?' on':''}" data-wi="${i}">${x.t}</div>`).join('')}</div>`;}
function showWk(i,btn){document.querySelectorAll('.ccontent').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));document.querySelector(`.ccontent[data-wi="${i}"]`).classList.add('on');btn.classList.add('on');}

function render_questions(el){const qs=[{q:'What does the first 90 days look like?',p:'Proactive planning',f:'Connect to your fast ramp-up record.'},{q:'How does materials planning interact with production and R&D?',p:'Cross-functional',f:'Reference OneH2 coordination.'},{q:'What planning systems/tools does the team use?',p:'Technical curiosity',f:'Mention SQL/JMP/Teamcenter, eagerness for SAP.'},{q:'Biggest challenge the expansion team faces?',p:'Problem-solver',f:'Listen, connect to experience.'},{q:'How does Micron measure success for this role?',p:'Results oriented',f:'Reference $400K, 20%, 26%.'},{q:'Opportunities for growth?',p:'Long-term commitment',f:'Tie to senior planning vision.'},{q:'How is the team preparing for phased ramp?',p:'Expansion understanding',f:'Relate to OneH2 scaling.'},{q:'🎯 Erik: How does materials integrate into ~$600M capital planning?',p:'Tailored + research',f:'Shows you understand the bigger picture.'},{q:'🎯 Jeff: What makes Boise unique vs previous global expansions?',p:'Tailored + respect',f:'Shows interest in his 20yr perspective.'},{q:'3-5 year vision for the expansion planning team?',p:'Strategic thinking',f:'Connect to your Micron career vision.'}];el.innerHTML=`<div class="tip" style="margin-bottom:1rem;"><strong>Pick 2-3 per interviewer.</strong> Tailor to background — Erik on capital/planning integration, Jeff on strategy.</div><div class="table-wrap"><table><thead><tr><th style="width:40%">Question</th><th style="width:20%">Purpose</th><th style="width:40%">Your Follow-Up</th></tr></thead><tbody>${qs.map(q=>`<tr><td><strong>${q.q}</strong></td><td>${q.p}</td><td style="color:var(--accent);font-size:0.82rem;">${q.f}</td></tr>`).join('')}</tbody></table></div>`;}

function render_closing(el){const v=[{l:'Confidence + Fit',t:'Thank you for your time. I’m even more confident that my analytical background, cost optimization experience, and cross-functional skills are a strong fit. Building a new facility from the ground up is exactly the challenge I want. I’m ready to relocate to Boise and invest long-term at Micron. What are the next steps?'},{l:'Enthusiasm + Value',t:'I appreciate the conversation. This role sits at the intersection of data analysis, supply chain optimization, and manufacturing execution — exactly where my strengths lie. I can hit the ground running with SQL and DOE while learning Micron’s systems. I’d love to continue.'},{l:'Mission-Aligned',t:'This has reinforced my excitement. The CHIPS Act expansion is one of the most important manufacturing investments in the country. My $400K savings through Lean and data-driven problem solving maps directly to what this team needs. Looking forward to next steps.'}];el.innerHTML=`<div class="card"><h3>🎤 Closing Statements</h3><div class="ctabs">${v.map((x,i)=>`<button class="ctab${i===0?' on':''}" onclick="showCl(${i},this)">${x.l}</button>`).join('')}</div>${v.map((x,i)=>`<div class="ccontent${i===0?' on':''}" data-ci="${i}">${x.t}</div>`).join('')}<div class="tip" style="margin-top:0.75rem;"><strong>"Do you have any questions?"</strong> → "Absolutely. I’ve been thinking about how materials planning connects to the broader expansion capital planning." Then ask from Step 10.</div></div><div class="card"><h3>📧 Thank You — Erik ReVeal</h3><div class="email"><div class="subj">Subject: Thank You – Materials Planning Engineer Interview</div><p>Dear Erik,</p><p>Thank you for speaking with me about the Materials Planning Engineer role. I especially appreciated hearing about <span class="placeholder">[specific topic]</span>.</p><p>Our conversation reinforced my excitement about Micron’s Boise expansion. My experience in data-driven optimization, Lean cost reduction, and cross-functional collaboration positions me to add value quickly.</p><p>I’m eager to continue and happy to provide additional information.</p><p>Best regards,<br>Vaibhav Mistari</p></div><div class="tip" style="margin-top:0.5rem;"><strong>⏰ Send within 2-4 hours.</strong> Personalize brackets.</div></div><div class="card"><h3>📧 Thank You — Panel (Erik & Jeff)</h3><div class="email"><div class="subj">Subject: Thank You – Materials Planning Engineer Interview</div><p>Dear Erik and Jeff,</p><p>Thank you both for the engaging conversation. Erik, I valued your insights on <span class="placeholder">[specific topic]</span>. Jeff, your perspective on <span class="placeholder">[specific topic]</span> gave me a clear picture of the team’s mission.</p><p>I’m excited to contribute my analytical and cost optimization experience to Micron’s expansion.</p><p>Best regards,<br>Vaibhav Mistari</p></div></div>`;}
function showCl(i,btn){document.querySelectorAll('.ccontent').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));document.querySelector(`.ccontent[data-ci="${i}"]`).classList.add('on');btn.classList.add('on');}

function render_gameday(el){const g=[{t:'📦 Before Interview Day',items:['Review both interviewer profiles and strategies','Practice SHARE answers out loud (1-2 min each)','Rehearse Top 5 common questions','Run through 10 behavioral questions','Study 3 technical scenarios','Memorize values: Collaboration, Tenacity, Customer Focused, Innovation, People','Brush up: DRAM/NAND, MRP/SAP, S&OP, semiconductor supply chain','Choose weakness version and practice','Prepare 2-3 questions for Erik','Choose closing statement','Draft thank-you email with [brackets]','Test tech setup (video, audio, lighting, background)']},{t:'🔵 03/30 3-4 PM — Erik ReVeal',items:['Lead with SQL/JMP analytical skills','Tell $400K Lean cost savings story','Discuss DOE optimization (+20%)','Show cross-functional collaboration','Mention BOM management and vendor sourcing','Demonstrate planning-at-scale understanding','Ask about materials/capital planning integration','Ask about first 90 days','Deliver closing statement','Send thank-you within 2-4 hours']},{t:'🟣 Follow-Up — Erik & Jeff Binford',items:['Prepare for Jeff’s strategic questions','Show long-term Boise commitment','Demonstrate semiconductor passion & CHIPS Act awareness','Lead with process scaling (PSA SOPs, AM scale-up)','Ask Jeff about Boise expansion uniqueness','Ask about 3-5 year team vision','Show growth mindset and leadership potential','Send individual thank-yous within 2-4 hours']}];el.innerHTML=g.map(gr=>`<div class="card"><h3>${gr.t}</h3>${gr.items.map((item,i)=>{const key=gr.t.slice(0,10)+i;const done=getCheckDone(key);return`<div class="chk${done?' done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleChk(this,'${key}')"><label onclick="this.previousElementSibling.click()">${item}</label></div>`;}).join('')}</div>`).join('');}

renderNav();renderProgress();renderStep();
